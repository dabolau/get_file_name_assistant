name: BuildKylin

on:
  workflow_dispatch:

jobs:
  buildKylin:
    runs-on: ubuntu-latest

    concurrency:
      group: build-kylin
      cancel-in-progress: false

    container:
      image: ubuntu:20.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install jq and curl and xz-utils
        run: apt-get update && apt-get install -y jq curl xz-utils

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libgcrypt20-dev \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            jq

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter Linux release
        run: flutter build linux --release

      - name: Fix library paths for Kylin/Ubuntu 24.04
        run: |
          # Install patchelf
          apt-get install -y patchelf
          # Fix hardcoded /lib64 paths that don't exist on newer systems
          find build/linux/x64/release/bundle -name "*.so" -exec patchelf --replace-needed /lib64/libc.so.6 libc.so.6 {} \; 2>/dev/null || true
          find build/linux/x64/release/bundle -name "get_file_name_assistant" -exec patchelf --replace-needed /lib64/libc.so.6 libc.so.6 {} \; 2>/dev/null || true
          find build/linux/x64/release/bundle -name "get_file_name_assistant" -exec patchelf --replace-needed /lib64/ld-linux-x86-64.so.2 ld-linux-x86-64.so.2 {} \; 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KylinApp
          path: build/linux/x64/release/bundle/
          retention-days: 30