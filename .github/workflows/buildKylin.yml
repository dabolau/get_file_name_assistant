name: BuildKylin

on:
  workflow_dispatch:

jobs:
  buildKylin:
    runs-on: ubuntu-latest

    concurrency:
      group: build-kylin
      cancel-in-progress: false

    container:
      image: ubuntu:20.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEBIAN_FRONTEND: noninteractive
      TZ: UTC

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install git and jq and curl and xz-utils
        run: export DEBIAN_FRONTEND=noninteractive && apt-get update && apt-get install -y git jq curl xz-utils

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Fix git safe directory
        run: git config --global --add safe.directory '*'

      - name: Install system dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export TZ=UTC
          apt-get update
          apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libgcrypt20-dev \
            libstdc++-10-dev \
            libgl1-mesa-glx \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libcanberra-gtk-module \
            patchelf

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter Linux release
        run: flutter build linux --release

      - name: Fix library paths for Kylin/Ubuntu 24.04
        run: |
          # Fix hardcoded /lib64 paths that don't exist on newer systems
          find build/linux/x64/release/bundle -name "*.so" -exec patchelf --replace-needed /lib64/libc.so.6 libc.so.6 {} \; 2>/dev/null || true
          find build/linux/x64/release/bundle -name "get_file_name_assistant" -exec patchelf --replace-needed /lib64/libc.so.6 libc.so.6 {} \; 2>/dev/null || true
          find build/linux/x64/release/bundle -name "get_file_name_assistant" -exec patchelf --replace-needed /lib64/ld-linux-x86-64.so.2 ld-linux-x86-64.so.2 {} \; 2>/dev/null || true

      - name: Copy additional libraries for Kylin
        run: |
          # Install libgl1-mesa-glx to get libGLESv2.so.2
          apt-get install -y libgl1-mesa-glx
          # Copy libGLESv2.so.2 and other required libraries to bundle
          cp -n /usr/lib/x86_64-linux-gnu/libGLESv2.so.2 build/linux/x64/release/bundle/lib/ 2>/dev/null || true
          cp -n /usr/lib/x86_64-linux-gnu/libGLX_mesa.so.0 build/linux/x64/release/bundle/lib/ 2>/dev/null || true
          cp -n /usr/lib/x86_64-linux-gnu/libEGL.so.1 build/linux/x64/release/bundle/lib/ 2>/dev/null || true
          cp -n /usr/lib/x86_64-linux-gnu/dri/i965_dri.so build/linux/x64/release/bundle/lib/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KylinApp
          path: build/linux/x64/release/bundle/
          retention-days: 30